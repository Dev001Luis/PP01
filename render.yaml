services:
  - type: web
    name: luis-portfolio
    plan: free
    region: frankfurt
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install && npm run build
      php artisan optimize
    startCommand: vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: APP_KEY
        generateValue: true # This tells Render to create a secure key for you automatically
