services:
  - type: web
    name: luis-portfolio
    plan: free
    env: docker
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: APP_KEY
        generateValue: true
