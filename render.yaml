services:
  - type: web
    name: luis-portfolio-node
    env: php
    plan: free
    region: frankfurt # Or your preferred region
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      npm install && npm run build
      php artisan optimize
    startCommand: vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: APP_KEY
        fromValue: ${APP_KEY} # You will generate this in the Render Dashboard
